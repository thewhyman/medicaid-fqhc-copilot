name: Regression Evals

# Run deterministic evals on every push and on a scheduled cadence.
# Schedule catches model drift between deploys.
# Push runs catch code regressions immediately.
#
# Schedule strategy:
#   - Daily agent evals through 2026-03-24 (intensive drift monitoring week)
#   - After that, switch back to weekly (Mondays 9am UTC)
#   To revert to weekly: replace the cron line with "0 9 * * 1"
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Daily at 9:00 AM UTC — intensive drift monitoring through 2026-03-24
    - cron: "0 9 * * *"

jobs:
  deterministic-evals:
    name: Deterministic Eligibility Evals
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install python-dotenv mcp openai mem0ai

      - name: Run deterministic evals
        run: python evals/test_eligibility.py

  # Agent evals require a running server + OpenAI API key.
  # Only runs on schedule to avoid burning API credits on every push.
  agent-evals:
    name: Agent Evals (scheduled)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    needs: deterministic-evals

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: medicaid
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          npm install

      - name: Seed database
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/medicaid
        run: python seed_db.py

      - name: Start server in background
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/medicaid
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          MEM0_API_KEY: ${{ secrets.MEM0_API_KEY }}
        run: |
          uvicorn server:app --host 0.0.0.0 --port 8000 &
          sleep 5
          curl -f http://localhost:8000/health

      - name: Run agent evals
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python evals/test_eligibility.py --agent

      - name: Post results to issue (on failure)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Regression eval failure — ${new Date().toISOString().slice(0, 10)}`,
              body: `Scheduled agent evals failed. This may indicate model drift.\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['eval-regression']
            });
