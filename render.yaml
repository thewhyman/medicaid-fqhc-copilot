databases:
  - name: medicaid-db
    plan: free
    databaseName: medicaid1

services:
  - type: web
    name: medicaid-fqhc-copilot
    plan: free
    runtime: python
    buildCommand: pip install -r requirements.txt && npm install -g @modelcontextprotocol/server-postgres @modelcontextprotocol/server-filesystem && python seed_db.py
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: MEM0_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: medicaid-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.13.2"
